name: Secure DB Backup to R2

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install Tools
        run: |
          sudo apt-get update -qq >/dev/null 2>&1
          sudo apt-get install -y default-mysql-client rclone >/dev/null 2>&1

      - name: Configure R2
        run: |
          mkdir -p ~/.config/rclone
          cat <<EOF > ~/.config/rclone/rclone.conf
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${{ secrets.R2_ACCESS_KEY_ID }}
          secret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}
          endpoint = ${{ secrets.R2_ENDPOINT }}
          acl = private
          EOF

      - name: Dump & Verify
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          set -o pipefail
          set +x

          mysqldump \
            --single-transaction --quick --skip-extended-insert --complete-insert \
            --set-gtid-purged=OFF \
            --default-character-set=utf8mb4 \
            -h${{ secrets.DB_HOST }} -P${{ secrets.DB_PORT }} \
            -u${{ secrets.DB_USER }} -p"$DB_PASSWORD" \
            --ssl-mode=DISABLED \
            --databases ${{ secrets.DB_DATA }} \
            | gzip > latest_backup.sql.gz 2>/dev/null

          if [ $? -ne 0 ]; then
            echo "Error"
            exit 1
          fi

          FILE_SIZE=$(stat -c%s latest_backup.sql.gz)
          if [ "$FILE_SIZE" -lt 10240 ]; then
            echo "Error"
            exit 1
          fi

      - name: Upload to R2
        run: |
          set +x
          rclone copy latest_backup.sql.gz r2:${{ secrets.R2_BUCKET }}/ \
            --s3-no-check-bucket --checksum -q >/dev/null 2>&1

          if [ $? -ne 0 ]; then
            echo "Error"
            exit 1
          fi

          echo "Success"

      - name: Cleanup
        if: always()
        run: |
          rm -rf ~/.config/rclone >/dev/null 2>&1
          rm -f latest_backup.sql.gz >/dev/null 2>&1
